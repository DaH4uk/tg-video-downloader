name: main

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "**" ]

env:
  IMAGE_NAME: dah4uk/tg-video-downloader
  VERSION: 'v0.0.${{ github.run_number }}'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: [self-hosted, linux, arm64, synology]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

      - name: Run golangci-lint
        run: golangci-lint run

  build:
    runs-on: [self-hosted, linux, arm64, synology]
    needs: lint
    if: github.event_name == 'pull_request' && github.ref != 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -o /dev/null ./cmd/service

  build_docker:
    runs-on: [self-hosted, linux, arm64, synology]
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: Teamcloud AM

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ vars.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ vars.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.SSH_HOST }}
          username: ${{ vars.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/tg-video-downloader

            echo "REGISTRY_URL=${{ vars.REGISTRY_URL }}" > .env
            echo "IMAGE_NAME=${{ env.IMAGE_NAME }}" >> .env
            echo "VERSION=${{ env.VERSION }}" >> .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
            echo "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" >> .env
            echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            echo "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" >> .env

            docker login ${{ vars.REGISTRY_URL }} \
              -u ${{ vars.REGISTRY_USERNAME }} \
              -p ${{ secrets.REGISTRY_PASSWORD }}

            docker compose pull
            docker compose up -d --remove-orphans
