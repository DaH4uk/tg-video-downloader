# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'
          cache-dependency-path: ./go.sum

      - name: Install dependencies
        run: go mod download

      - name: Test
        run: go test -cover -v ./...

      - name: Build service
        run: go build -o ./bin/service ./cmd/service

      - name: Show bin
        run: ls -la ./bin

      - name: Get latest version tag
        id: get_tag
        run: |
          # Загружаем все теги из удаленного репозитория
          git fetch --tags

          # Получаем последний тег (если нет, используем v0.0.0)
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $TAG"

          # Увеличиваем версию (инкремент PATCH)
          VERSION=$(echo $TAG | awk -F. '{printf "%s.%s.%d", $1, $2, $3+1}')
          echo "New version: $VERSION"

          # Проверяем, существует ли тег
          if git rev-parse $VERSION >/dev/null 2>&1; then
            echo "Tag $VERSION already exists. Using the existing tag."
          else
            echo "Creating new tag: $VERSION"
            git tag $VERSION
            git push origin $VERSION
          fi

          # Передаем версию в env
          echo "version=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: gitea.walsy.synology.me
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --file ./Dockerfile \
                       -t gitea.walsy.synology.me/dah4uk/telegram-vpn-bot:${{ env.version }} \
                       -t gitea.walsy.synology.me/dah4uk/telegram-vpn-bot:latest .

      - name: Push Docker image
        run: |
          docker push gitea.walsy.synology.me/dah4uk/telegram-vpn-bot:latest
