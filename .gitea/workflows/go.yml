# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'
          cache-dependency-path: ./go.sum

      - name: Install dependencies
        run: go mod download

      - name: Test
        run: go test -cover -v ./...

      - name: Build service
        run: go build -o ./bin/service ./cmd/service

      - name: Show bin
        run: ls -la ./bin

      - name: Log in to Docker Registry (Gitea)
        uses: docker/login-action@v2
        with:
          registry: gitea.walsy.synology.me
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Build Docker image
        run: |
          docker build --file ./Dockerfile -t gitea.walsy.synology.me/dah4uk/telegram-vpn-bot:latest .

      - name: Push Docker image
        run: |
          docker push gitea.walsy.synology.me/dah4uk/telegram-vpn-bot:latest
