# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  GO_VERSION: '1.23.4'
  REGISTRY: gitea.walsy.synology.me
  REGISTRY_USERNAME: dah4uk
  IMAGE_NAME: dah4uk/telegram-vpn-bot
  VERSION_PREFIX: 'v0.0.'
  VERSION: ${{ env.VERSION_PREFIX }}${{ github.run_number }}
  CONTAINER_NAME: telegram-vpn-bot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./go.sum

      - name: Test
        run: go test -cover -v ./...

  build_docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create image version
        run: |
          echo "VERSION=${{ env.VERSION }}"

      - name: Build Docker image
        run: |
          docker build --file ./Dockerfile \
                       -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }} .

      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: build_docker

    steps:
      - name: Log in to Docker Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Deploy container
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
          
          # Остановить старый контейнер (если существует)
          docker stop ${{ CONTAINER_NAME }}
          docker rm ${{ CONTAINER_NAME }}
          
          # Запустить новый контейнер с указанной версией
          docker run -d --name telegram-vpn-bot \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
