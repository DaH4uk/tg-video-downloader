name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest
    env:
      PROJECT_VERSION: 1.0.0-alpha

    steps:
      - uses: actions/checkout@v3

      - name: Build docker image
        run: >
          docker build .
          --file Dockerfile
          --build-arg PROJECT_VERSION="$PROJECT_VERSION"
          --tag walsy/telegram-vpn-bot:$(date +%s)
