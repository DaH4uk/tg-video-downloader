services:
  server:
    build:
      context: .
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    restart: on-failure:5
    env_file:
      - ./.env
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "gitea", "-U", "giteauser" ]
      timeout: 45s
      interval: 10s
      retries: 10
    environment:
      POSTGRES_USER: giteauser
      POSTGRES_PASSWORD: giteapass
      POSTGRES_DB: gitea
    volumes:
      - ./db:/var/lib/postgresql/data:rw
    ports:
      - "5432:5432"

